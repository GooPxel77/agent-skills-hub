name: Daily Heavy Compute

on:
  schedule:
    - cron: '30 2 * * *'  # Run every day at 02:30 UTC
  workflow_dispatch:
    inputs:
      limit:
        description: "Max skills to process (DAILY_HEAVY_LIMIT)"
        required: false
        default: "100"
      min_star_threshold:
        description: 'Minimum stars to ingest (default: 50)'
        required: false
        default: '50'

env:
  MIN_STAR_THRESHOLD: ${{ inputs.min_star_threshold || '50' }}

concurrency:
  group: heavy-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  heavy-compute:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Daily Heavy Computations
        working-directory: ./backend
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          DAILY_HEAVY_LIMIT: ${{ inputs.limit || 100 }}
        run: python daily_heavy_runner.py
