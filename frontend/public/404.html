<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Agent Skills Hub</title>
  <script>
    // GitHub Pages SPA redirect for HashRouter
    // Any 404 path gets converted to /#/path and redirected to index.html
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    window.location.replace('/' + '#' + path + search + hash);
  </script>
</head>
<body></body>
</html>
